syntax = "proto3";

package bench;

service Echo {
  rpc SendBytes(EchoRequest) returns (EchoResponse);
}

message EchoRequest {
  bytes data = 1;
}

message EchoResponse {
  bytes data = 1;
}

service BenchStream {
  rpc StreamData(StreamRequest) returns (stream StreamResponse);
}

message StreamRequest {
  uint32 payload_size = 1;
  uint32 count = 2;
}

message StreamResponse {
  bytes data = 1;
}
